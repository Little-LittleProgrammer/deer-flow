# ============================================================================
# 工具组配置
# ============================================================================
# 定义工具组以便组织管理和访问控制

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# 工具配置
# ============================================================================
# 配置 Agent 可用的工具

tools:
  # 网页搜索工具（使用 DuckDuckGo，无需 API 密钥）
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  # 网页搜索工具（需要 Tavily API 密钥）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.tavily.tools:web_search_tool
  #   max_results: 5
  #   # api_key: $TAVILY_API_KEY  # 如需要请设置

  # 网页搜索工具（使用 InfoQuest，需要 InfoQuest API 密钥）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.infoquest.tools:web_search_tool
  #   # 用于限制搜索结果范围，只返回指定时间范围内的内容。设为 -1 禁用时间过滤
  #   search_time_range: 10

  # 网页抓取工具（使用 Jina AI reader）
  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  # 网页抓取工具（使用 InfoQuest）
  # - name: web_fetch
  #   group: web
  #   use: deerflow.community.infoquest.tools:web_fetch_tool
  #   # 整个抓取过程的超时时间（秒）。设为正值启用，-1 禁用
  #   timeout: 10
  #   # 页面加载后的等待时间（秒）。设为正值启用，-1 禁用
  #   fetch_time: 10
  #   # 页面导航超时时间（秒）。设为正值启用，-1 禁用
  #   navigation_timeout: 30

  # 图片搜索工具（使用 DuckDuckGo）
  # 在生成图片前用于查找参考图片
  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  # 图片搜索工具（使用 InfoQuest）
  # - name: image_search
  #   group: web
  #   use: deerflow.community.infoquest.tools:image_search_tool
  #   # 用于限制图片搜索结果范围，只返回指定时间范围内的内容。设为 -1 禁用时间过滤
  #   image_search_time_range: 10
  #   # 图片尺寸过滤。选项："l"（大）、"m"（中）、"i"（图标）
  #   image_size: "i"

  # 文件操作工具
  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  # Bash 执行工具
  # 仅在使用隔离的 shell 沙箱，或 sandbox.allow_host_bash: true 显式启用主机 bash 时生效
  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

# ============================================================================
# 工具搜索配置（延迟加载工具）
# ============================================================================
# 启用后，MCP 工具不会直接加载到 Agent 的上下文中
# 而是在系统提示中按名称列出，运行时通过 tool_search 工具发现
# 这可以减少上下文占用，当多个 MCP 服务器暴露大量工具时提高工具选择准确性

tool_search:
  enabled: false

# ============================================================================
# 沙箱配置
# ============================================================================
# 选择本地沙箱（直接执行）或基于 Docker 的 AIO 沙箱

# 选项 1：本地沙箱（默认）
# 直接在主机上执行命令
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  # 默认禁用主机 bash 执行，因为 LocalSandboxProvider 不是安全的 shell 隔离边界
  # 仅在完全可信的单用户本地工作流中启用
  allow_host_bash: false

# 选项 2：基于容器的 AIO 沙箱
# 在隔离容器中执行命令（Docker 或 Apple Container）
# macOS：自动优先使用 Apple Container（如可用），否则回退到 Docker
# 其他平台：使用 Docker
# 取消注释以使用：
# sandbox:
#   use: deerflow.community.aio_sandbox:AioSandboxProvider
#
#   # 可选：要使用的容器镜像（适用于 Docker 和 Apple Container）
#   # 默认：enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#   # 推荐：enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest（同时支持 x86_64 和 arm64）
#   # image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#
#   # 可选：沙箱容器的基础端口（默认：8080）
#   # port: 8080

#   # 可选：最大并发沙箱容器数（默认：3）
#   # 当达到限制时，最近最少使用的沙箱会被淘汰以腾出空间
#   # 使用正整数；省略此字段则使用默认值
#   # replicas: 3
#
#   # 可选：容器名称前缀（默认：deer-flow-sandbox）
#   # container_prefix: deer-flow-sandbox
#
#   # 可选：从主机挂载到容器的额外目录
#   # 注意：Skills 目录会自动从 skills.path 挂载到 skills.container_path
#   # mounts:
#   #   # 其他自定义挂载
#   #   - host_path: /path/on/host
#   #     container_path: /home/user/shared
#   #     read_only: false
#   #
#   #   # DeerFlow 会将配置的 container_path 值暴露给 Agent
#   #   # 这样它可以直接读写挂载的目录，如 /home/user/shared
#
#   # 可选：注入到沙箱容器的环境变量
#   # 以 $ 开头的值将从主机环境变量解析
#   # environment:
#   #   NODE_ENV: production
#   #   DEBUG: "false"
#   #   API_KEY: $MY_API_KEY        # 从主机的 MY_API_KEY 环境变量读取
#   #   DATABASE_URL: $DATABASE_URL  # 从主机的 DATABASE_URL 环境变量读取

# 选项 3：Provisioner 管理的 AIO 沙箱（docker-compose-dev）
# 每个 sandbox_id 在 k3s 中获得专用 Pod，由 provisioner 管理
# 推荐用于生产环境或需要更好隔离性和可扩展性的高级用户
# sandbox:
#   use: deerflow.community.aio_sandbox:AioSandboxProvider
#   provisioner_url: http://provisioner:8002

# ============================================================================
# 子代理配置
# ============================================================================
# 配置子代理执行的超时时间
# 子代理是主代理委派任务的后台工作进程

# subagents:
#   # 所有子代理的默认超时时间（秒）（默认：900 = 15 分钟）
#   timeout_seconds: 900
#
#   # 可选：每个代理的超时覆盖
#   agents:
#     general-purpose:
#       timeout_seconds: 1800  # 复杂多步任务 30 分钟
#     bash:
#       timeout_seconds: 300   # 快速命令执行 5 分钟

# ============================================================================
# ACP 代理配置
# ============================================================================
# 为内置的 `invoke_acp_agent` 工具配置外部 ACP 兼容代理

# acp_agents:
#   claude_code:
#     # DeerFlow 需要一个 ACP 适配器。标准的 `claude` CLI 不直接支持 ACP
#     # 请单独安装 `claude-agent-acp` 或使用：
#     command: npx
#     args: ["-y", "@zed-industries/claude-agent-acp"]
#     description: Claude Code 用于实现、重构和调试
#     model: null
#     # auto_approve_permissions: false  # 设为 true 自动批准 ACP 权限请求
#     # env:                             # 可选：向代理子进程注入环境变量
#     #   ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY  # $VAR 从主机环境解析
#
#   codex:
#     # DeerFlow 需要一个 ACP 适配器。标准的 `codex` CLI 不直接支持 ACP
#     # 请单独安装 `codex-acp` 或使用：
#     command: npx
#     args: ["-y", "@zed-industries/codex-acp"]
#     description: Codex CLI 用于仓库任务和代码生成
#     model: null
#     # auto_approve_permissions: false  # 设为 true 自动批准 ACP 权限请求
#     # env:                             # 可选：向代理子进程注入环境变量
#     #   OPENAI_API_KEY: $OPENAI_API_KEY  # $VAR 从主机环境解析

# ============================================================================
# Skills 配置
# ============================================================================
# 配置专门 Agent 工作流的 Skills 目录

skills:
  # 主机上的 Skills 目录路径（相对于项目根目录或绝对路径）
  # 默认：../skills（相对于 backend 目录）
  # 取消注释以自定义：
  # path: /absolute/path/to/custom/skills

  # Skills 在沙箱容器中的挂载路径
  # Agent 使用此路径访问 Skills（本地和 Docker 沙箱均适用）
  # 默认：/mnt/skills
  container_path: /mnt/skills

# ============================================================================
# 标题生成配置
# ============================================================================
# 自动对话标题生成设置

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null # 使用默认模型（模型列表中的第一个模型）

# ============================================================================
# 摘要配置
# ============================================================================
# 当接近 token 限制时自动总结对话历史
# 有助于在长对话中保持上下文而不超出模型限制

summarization:
  enabled: true

  # 用于摘要的模型（null = 使用默认模型）
  # 推荐：使用轻量、经济的模型，如 "gpt-4o-mini" 或类似模型
  model_name: null

  # 触发条件 - 至少需要一个
  # 当满足任一阈值时运行摘要（OR 逻辑）
  # 可以指定单个触发条件或触发条件列表
  trigger:
    # 当 token 数达到 15564 时触发
    - type: tokens
      value: 15564
    # 取消注释以在消息数达到 50 时也触发
    # - type: messages
    #   value: 50
    # 取消注释以在达到模型最大输入 token 的 80% 时触发
    # - type: fraction
    #   value: 0.8

  # 摘要后的上下文保留策略
  # 指定保留多少最近的历史记录
  keep:
    # 保留最近的 10 条消息（推荐）
    type: messages
    value: 10
    # 备选：保留特定的 token 数量
    # type: tokens
    # value: 3000
    # 备选：保留模型最大输入 token 的百分比
    # type: fraction
    # value: 0.3

  # 准备摘要消息时要保留的最大 token 数
  # 设为 null 跳过修剪（不推荐用于非常长的对话）
  trim_tokens_to_summarize: 15564

  # 自定义摘要提示模板（null = 使用默认 LangChain 提示）
  # 提示应指导模型提取重要上下文
  summary_prompt: null

# ============================================================================
# 记忆配置
# ============================================================================
# 全局记忆机制
# 存储用户上下文和对话历史以提供个性化响应
memory:
  enabled: true
  storage_path: memory.json # 相对于 backend 目录的路径
  debounce_seconds: 30 # 处理排队更新前的等待时间
  model_name: null # 使用默认模型
  max_facts: 100 # 最大存储事实数量
  fact_confidence_threshold: 0.7 # 存储事实的最低置信度
  injection_enabled: true # 是否将记忆注入系统提示
  max_injection_tokens: 2000 # 记忆注入的最大 token 数

# ============================================================================
# Checkpointer 配置
# ============================================================================
# 为嵌入式 DeerFlowClient 配置状态持久化
# LangGraph Server 通过服务器基础设施自行管理状态持久化
# （此设置不影响它）
#
# 配置后，DeerFlowClient 会自动使用此 checkpointer
# 使多轮对话可以在进程重启后持久保存
#
# 支持的类型：
#   memory   - 仅进程内。进程退出时状态丢失。（默认）
#   sqlite   - 基于 SQLite 文件的持久化。可跨重启保存。
#              需要：uv add langgraph-checkpoint-sqlite
#   postgres - PostgreSQL 持久化。适用于多进程部署。
#              需要：uv add langgraph-checkpoint-postgres psycopg[binary] psycopg-pool
#
# 示例：
#
# 内存（省略时的默认值 — 无持久化）：
# checkpointer:
#   type: memory
#
# SQLite（基于文件，单进程）：
checkpointer:
  type: sqlite
  connection_string: checkpoints.db
#
# PostgreSQL（多进程，生产环境）：
# checkpointer:
#   type: postgres
#   connection_string: postgresql://user:password@localhost:5432/deerflow

# ============================================================================
# IM 渠道配置
# ============================================================================
# 将 DeerFlow 连接到外部消息平台
# 所有渠道使用出站连接（WebSocket 或轮询）— 无需公网 IP

# channels:
#   # LangGraph Server URL 用于线程/消息管理（默认：http://localhost:2024）
#   # Docker 部署时，请使用 Docker 服务名而不是 localhost：
#   #   langgraph_url: http://langgraph:2024
#   #   gateway_url: http://gateway:8001
#   langgraph_url: http://localhost:2024
#   # Gateway API URL 用于辅助查询如 /models、/memory（默认：http://localhost:8001）
#   gateway_url: http://localhost:8001
#   #
#   # Docker Compose 注意事项：
#   # 如果渠道运行在 gateway 容器内，请使用容器 DNS 名称
#   # 而不是 localhost，例如：
#   # langgraph_url: http://langgraph:2024
#   # gateway_url: http://gateway:8001
#   # 您也可以设置 DEER_FLOW_CHANNELS_LANGGRAPH_URL / DEER_FLOW_CHANNELS_GATEWAY_URL
#
#   # 可选：所有 IM 渠道的默认移动端/会话设置
#   session:
#     assistant_id: lead_agent  # 或自定义代理名称；自定义代理通过 lead_agent + agent_name 路由
#     config:
#       recursion_limit: 100
#     context:
#       thinking_enabled: true
#       is_plan_mode: false
#       subagent_enabled: false
#
#   feishu:
#     enabled: false
#     app_id: $FEISHU_APP_ID
#     app_secret: $FEISHU_APP_SECRET
#     # domain: https://open.feishu.cn       # 中国区（默认）
#     # domain: https://open.larksuite.com   # 国际版
#
#   slack:
#     enabled: false
#     bot_token: $SLACK_BOT_TOKEN     # xoxb-...
#     app_token: $SLACK_APP_TOKEN     # xapp-...（Socket Mode）
#     allowed_users: []               # 空 = 允许所有用户
#
#   telegram:
#     enabled: false
#     bot_token: $TELEGRAM_BOT_TOKEN
#     allowed_users: []               # 空 = 允许所有用户
#
#     # 可选：渠道级别的会话覆盖
#     session:
#       assistant_id: mobile-agent  # 此处也支持自定义代理名称
#       context:
#         thinking_enabled: false
#
#       # 可选：按 user_id 进行用户级别覆盖
#       users:
#         "123456789":
#           assistant_id: vip-agent
#           config:
#             recursion_limit: 150
#           context:
#             thinking_enabled: true
#             subagent_enabled: true

# ============================================================================
# Guardrails 配置
# ============================================================================
# 可选的工具调用预执行授权
# 启用后，每个工具调用在执行前都会通过配置的提供程序进行评估
# 三种选项：内置允许列表、OAP 策略提供程序或自定义提供程序
# 完整文档请参见 backend/docs/GUARDRAILS.md
#
# 提供程序通过类路径使用 resolve_variable 加载（与模型/工具相同）

# --- 选项 1：内置 AllowlistProvider（无外部依赖）---
# guardrails:
#   enabled: true
#   provider:
#     use: deerflow.guardrails.builtin:AllowlistProvider
#     config:
#       denied_tools: ["bash", "write_file"]

# --- 选项 2：OAP passport 提供程序（开放标准，任何实现）---
#   Open Agent Passport (OAP) 规范定义了 passport 格式和决策代码
#   任何 OAP 兼容的提供程序均可。使用 APort（参考实现）示例：
#     pip install aport-agent-guardrails && aport setup --framework deerflow
# guardrails:
#   enabled: true
#   provider:
#     use: aport_guardrails.providers.generic:OAPGuardrailProvider

# --- 选项 3：自定义提供程序（任何具有 evaluate/aevaluate 方法的类）---
# guardrails:
#   enabled: true
#   provider:
#     use: my_package:MyGuardrailProvider
#     config:
#       key: value