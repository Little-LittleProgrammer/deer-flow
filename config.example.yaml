# DeerFlow 应用配置文件
#
# 使用指南：
# - 将此文件复制为 `config.yaml` 并根据您的环境进行自定义
# - 此配置文件的默认路径为当前工作目录下的 `config.yaml`
#   但您可以通过 `DEER_FLOW_CONFIG_PATH` 环境变量更改路径
# - 所有字段值都支持使用环境变量。例如：`api_key: $OPENAI_API_KEY`
# - `use` 路径是一个字符串，格式为 "包名.子包名.模块名:类名/变量名"

# ============================================================================
# 配置版本（用于检测过时的配置文件）
# ============================================================================
# 当配置模式变更时增加此数字
# 运行 `make config-upgrade` 将新字段合并到您的本地 config.yaml 中
config_version: 4

# ============================================================================
# 日志配置
# ============================================================================
# deerflow 模块的日志级别（debug/info/warning/error）
log_level: info

# ============================================================================
# Token 使用追踪
# ============================================================================
# 追踪每次模型调用的 LLM token 使用量（输入/输出/总 token 数）
# 通过 TokenUsageMiddleware 在 info 级别记录日志
token_usage:
  enabled: false

# ============================================================================
# 模型配置
# ============================================================================
# 配置 Agent 可用的 LLM 模型

