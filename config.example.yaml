# ============================================================================
# 工具分组
# ============================================================================
# 定义工具分组，便于组织与访问控制

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# 工具配置
# ============================================================================
# 配置 Agent 可用的工具

tools:
  # 网页搜索（DuckDuckGo，无需 API Key）
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  # 网页搜索（需要 Tavily API Key）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.tavily.tools:web_search_tool
  #   max_results: 5
  #   # api_key: $TAVILY_API_KEY  # 按需设置

  # 网页搜索（InfoQuest，需要 InfoQuest API Key）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.infoquest.tools:web_search_tool
  #   # 限制搜索结果时间范围，仅返回该范围内的内容；-1 表示不按时间过滤
  #   search_time_range: 10

  # 网页搜索（Exa，需要 EXA_API_KEY）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.exa.tools:web_search_tool
  #   max_results: 5
  #   search_type: auto  # 可选：auto, neural, keyword
  #   contents_max_characters: 1000
  #   # api_key: $EXA_API_KEY

  # 网页抓取（Exa）
  # 注意：同一时间只能启用一个 web_fetch 提供方。
  # 启用本项前请先注释掉下方 Jina AI 的 web_fetch 配置。
  # - name: web_fetch
  #   group: web
  #   use: deerflow.community.exa.tools:web_fetch_tool
  #   # api_key: $EXA_API_KEY

  # 网页抓取（Jina AI Reader）
  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  # 网页抓取（InfoQuest）
  # - name: web_fetch
  #   group: web
  #   use: deerflow.community.infoquest.tools:web_fetch_tool
  #   # 整站爬取总超时（秒）；正数启用，-1 关闭
  #   timeout: 10
  #   # 页面加载后的等待时间（秒）；正数启用，-1 关闭
  #   fetch_time: 10
  #   # 导航到页面的超时（秒）；正数启用，-1 关闭
  #   navigation_timeout: 30

  # 图片搜索（DuckDuckGo）
  # 可在生图前查找参考图
  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  # 图片搜索（InfoQuest）
  # - name: image_search
  #   group: web
  #   use: deerflow.community.infoquest.tools:image_search_tool
  #   # 限制图片搜索结果时间范围；-1 表示不按时间过滤
  #   image_search_time_range: 10
  #   # 图片尺寸过滤：l=大、m=中、i=图标
  #   image_size: "i"

  # 文件操作工具
  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: glob
    group: file:read
    use: deerflow.sandbox.tools:glob_tool
    max_results: 200

  - name: grep
    group: file:read
    use: deerflow.sandbox.tools:grep_tool
    max_results: 100

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  # Bash 执行工具
  # 仅在使用隔离 Shell 沙箱时可用，或显式设置 sandbox.allow_host_bash: true 允许宿主机 Bash 时可用。
  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

# ============================================================================
# 工具搜索（延迟加载工具）
# ============================================================================
# 启用后，MCP 工具不会直接载入 Agent 上下文，
# 而是在系统提示中按名称列出，运行时可经 tool_search 发现。
# 可减少上下文占用，并在多个 MCP 暴露大量工具时提高选型准确度。

tool_search:
  enabled: false

# ============================================================================
# 沙箱配置
# ============================================================================
# 可选本地沙箱（直接执行）或基于 Docker 的一体化（AIO）沙箱

# 选项 1：本地沙箱（默认）
# 在宿主机上直接执行命令
uploads:
  # 上传 PDF 时使用的 PDF 转 Markdown 方式。
  # auto        — 已安装 pymupdf4llm 时优先使用；扫描件或加密 PDF 回退到 MarkItDown（推荐默认）。
  # pymupdf4llm — 始终用 pymupdf4llm（需安装：uv add pymupdf4llm）。
  #               标题/表格提取更好，多数文件更快。
  # markitdown  — 始终用 MarkItDown（原始行为，无额外依赖）。
  pdf_converter: auto

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  # 默认关闭宿主机 Bash：LocalSandboxProvider 对 Shell 并非安全隔离边界。
  # 仅在完全可信的单用户本地场景下开启。
  allow_host_bash: false
  # 可选：将额外宿主机目录挂载进沙箱。
  # 每项将宿主机路径映射为 Agent 可访问的虚拟容器内路径。
  # mounts:
  #   - host_path: /home/user/my-project    # 宿主机绝对路径
  #     container_path: /mnt/my-project     # 沙箱内虚拟路径
  #     read_only: true                     # 是否只读（默认 false）

  # 工具输出截断上限（字符数）。
  # bash 采用中段截断（头+尾），因错误可能出现在输出任意位置。
  # read_file、ls 采用头部截断，因内容以前部为主。
  # 设为 0 表示不截断。
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000

# 选项 2：基于容器的一体化（AIO）沙箱
# 在隔离容器（Docker 或 Apple Container）中执行命令
# macOS：若可用则优先 Apple Container，否则回退 Docker
# 其他平台：使用 Docker
# 取消注释以启用：
# sandbox:
#   use: deerflow.community.aio_sandbox:AioSandboxProvider
#
#   # 可选：容器镜像（Docker 与 Apple Container 均适用）
#   # 默认：enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#   # 推荐：同上（x86_64 与 arm64 均可用）
#   # image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#
#   # 可选：沙箱容器基础端口（默认 8080）
#   # port: 8080

#   # 可选：并发沙箱容器数量上限（默认 3）
#   # 达到上限时会淘汰最久未使用的沙箱以腾出位置。填正整数；省略则使用默认值。
#   # replicas: 3
#
#   # 可选：容器名前缀（默认 deer-flow-sandbox）
#   # container_prefix: deer-flow-sandbox
#
#   # 可选：宿主机到容器的额外挂载目录
#   # 注意：技能目录会按 skills.path → skills.container_path 自动挂载
#   # mounts:
#   #   # 其他自定义挂载
#   #   - host_path: /path/on/host
#   #     container_path: /home/user/shared
#   #     read_only: false
#   #
#   #   # DeerFlow 会把已配置的 container_path 暴露给 Agent，
#   #   # 使其可直接读写如 /home/user/shared 等挂载目录
#
#   # 可选：注入沙箱容器的环境变量
#   # 以 $ 开头的值会从宿主机环境变量解析
#   # environment:
#   #   NODE_ENV: production
#   #   DEBUG: "false"
#   #   API_KEY: $MY_API_KEY        # 从宿主机 MY_API_KEY 读取
#   #   DATABASE_URL: $DATABASE_URL  # 从宿主机 DATABASE_URL 读取
#   #   FEISHU_APP_ID: $FEISHU_APP_ID
#   #   FEISHU_APP_SECRET: $FEISHU_APP_SECRET
#   #   FEISHU_MCP_TOKEN: $FEISHU_MCP_TOKEN
#   #   # 飞书项目空间 Key，用于需求列表 API（/api/lark/requirements）
#   #   # 从飞书项目 URL 中提取：https://project.feishu.cn/{project_key}/...
#   #   FEISHU_PROJECT_KEY: $FEISHU_PROJECT_KEY

# 选项 3：由 Provisioner 管理的 AIO 沙箱（docker-compose-dev）
# 每个 sandbox_id 在 k3s 中对应独立 Pod，由 provisioner 管理。
# 适合生产或需要更强隔离与扩展性的高级用户：
# sandbox:
#   use: deerflow.community.aio_sandbox:AioSandboxProvider
#   provisioner_url: http://provisioner:8002

# ============================================================================
# 子 Agent 配置
# ============================================================================
# 配置子 Agent 执行超时等
# 子 Agent 是由主 Agent 委派任务的后台工作者

# subagents:
#   # 所有子 Agent 默认超时（秒）（默认 900 = 15 分钟）
#   timeout_seconds: 900
#   # 可选：全局最大轮次覆盖
#   # max_turns: 120
#
#   # 可选：按子 Agent 类型覆盖
#   agents:
#     general-purpose:
#       timeout_seconds: 1800  # 复杂多步任务 30 分钟
#       max_turns: 160
#     bash:
#       timeout_seconds: 300   # 快速命令 5 分钟
#       max_turns: 80

# ============================================================================
# ACP Agent 配置
# ============================================================================
# 为内置 `invoke_acp_agent` 工具配置外部 ACP 兼容 Agent。

# acp_agents:
#   claude_code:
#     # 此处需 ACP 适配层；标准 `claude` CLI 不直接讲 ACP。请单独安装 `claude-agent-acp` 或使用：
#     command: npx
#     args: ["-y", "@zed-industries/claude-agent-acp"]
#     description: Claude Code，用于实现、重构与调试
#     model: null
#     # auto_approve_permissions: false  # true 则自动批准 ACP 权限请求
#     # env:                             # 可选：向 Agent 子进程注入环境变量
#     #   ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY  # $VAR 从宿主机环境解析
#
#   codex:
#     # 此处需 ACP 适配层；标准 `codex` CLI 不直接讲 ACP。请单独安装 `codex-acp` 或使用：
#     command: npx
#     args: ["-y", "@zed-industries/codex-acp"]
#     description: Codex CLI，用于仓库任务与代码生成
#     model: null
#     # auto_approve_permissions: false  # true 则自动批准 ACP 权限请求
#     # env:                             # 可选：向 Agent 子进程注入环境变量
#     #   OPENAI_API_KEY: $OPENAI_API_KEY  # $VAR 从宿主机环境解析

# ============================================================================
# 技能（Skills）配置
# ============================================================================
# 配置技能目录，用于专用 Agent 工作流

skills:
  # 宿主机上技能目录路径（相对项目根或绝对路径）
  # 默认：相对 backend 目录的 ../skills
  # 取消注释以自定义：
  # path: /absolute/path/to/custom/skills

  # 技能在沙箱容器内的挂载路径
  # 本地沙箱与 Docker 沙箱均通过此路径供 Agent 访问
  # 默认：/mnt/skills
  container_path: /mnt/skills

# 说明：若需限制某个自定义 Agent 加载哪些技能，
# 在该 Agent 的 config.yaml 中定义 `skills` 列表（如 `agents/my-agent/config.yaml`）：
# - 省略或 null：加载所有全局已启用技能（默认）
# - []：该 Agent 不加载任何技能
# - ["skill-name"]：仅加载列出的技能

# ============================================================================
# 会话标题生成
# ============================================================================
# 自动生成对话标题

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null # null 使用默认模型（models 列表中的第一个）

# ============================================================================
# 对话摘要
# ============================================================================
# 在接近 token 上限时自动摘要历史，便于长对话在不超过模型限制的前提下保留上下文

summarization:
  enabled: true

  # 摘要所用模型（null = 默认模型）
  # 建议：使用轻量、低成本模型，如 "gpt-4o-mini" 等
  model_name: null

  # 触发条件 — 至少配置一项
  # 任一阈值满足即触发摘要（OR）
  # 可写单项或列表
  trigger:
    # token 数达到 15564 时触发
    - type: tokens
      value: 15564
    # 取消注释：消息条数达到 50 时也触发
    # - type: messages
    #   value: 50
    # 取消注释：达到模型最大输入 token 的 80% 时触发
    # - type: fraction
    #   value: 0.8

  # 摘要后保留多少近期上下文
  keep:
    # 保留最近 10 条消息（推荐）
    type: messages
    value: 10
    # 备选：按 token 数保留
    # type: tokens
    # value: 3000
    # 备选：按模型最大输入 token 的比例保留
    # type: fraction
    # value: 0.3

  # 送入摘要前的消息最多保留多少 token
  # null 表示不裁剪（极长对话不推荐）
  trim_tokens_to_summarize: 15564

  # 自定义摘要提示模板（null = 使用 LangChain 默认）
  # 提示应引导模型提取重要上下文
  summary_prompt: null

# ============================================================================
# 记忆（Memory）配置
# ============================================================================
# 全局记忆机制
# 存储用户上下文与对话历史，用于个性化回复
memory:
  enabled: true
  storage_path: memory.json # 相对 backend 目录的路径
  debounce_seconds: 30 # 处理队列更新前的等待时间（秒）
  model_name: null # null 使用默认模型
  max_facts: 100 # 最多保存的事实条数
  fact_confidence_threshold: 0.7 # 写入事实的最低置信度
  injection_enabled: true # 是否将记忆注入系统提示
  max_injection_tokens: 2000 # 记忆注入的最大 token 数

# ============================================================================
# 技能自进化
# ============================================================================
# 允许 Agent 在 skills/custom/ 下自主创建与改进技能
skill_evolution:
  enabled: false                # true 则允许 Agent 写入 skills/custom
  moderation_model_name: null  # LLM 安全扫描所用模型（null = 默认模型）

# ============================================================================
# Checkpointer 配置
# ============================================================================
# 为嵌入式 DeerFlowClient 配置状态持久化。
# LangGraph Server 通过自身基础设施单独管理持久化（本项不影响 Server）。
#
# 配置后 DeerFlowClient 会自动使用该 checkpointer，
# 多轮对话可在进程重启后保留。
#
# 支持的 type：
#   memory   - 仅进程内；进程退出即丢失。（省略时的默认）
#   sqlite   - 文件型 SQLite，可跨重启保留。
#              需要：uv add langgraph-checkpoint-sqlite
#   postgres - PostgreSQL，适合多进程部署。
#              需要：uv add langgraph-checkpoint-postgres psycopg[binary] psycopg-pool
#
# 示例：
#
# 内存型（省略时默认 — 不持久化）：
# checkpointer:
#   type: memory
#
# SQLite（文件、单进程）：
checkpointer:
  type: sqlite
  connection_string: checkpoints.db
#
# PostgreSQL（多进程、生产）：
# checkpointer:
#   type: postgres
#   connection_string: postgresql://user:password@localhost:5432/deerflow

# ============================================================================
# 即时通讯（IM）通道
# ============================================================================
# 将 DeerFlow 接入外部消息平台。
# 各通道均为出站连接（WebSocket 或轮询）— 无需公网 IP。

# channels:
#   # 线程/消息管理用的 LangGraph Server URL（默认 http://localhost:2024）
#   # Docker 部署请用服务名，勿写 localhost：
#   #   langgraph_url: http://langgraph:2024
#   #   gateway_url: http://gateway:8001
#   langgraph_url: http://localhost:2024
#   # 辅助接口（如 /models、/memory）用的 Gateway URL（默认 http://localhost:8001）
#   gateway_url: http://localhost:8001
#   #
#   # Docker Compose 说明：
#   # 若通道跑在 gateway 容器内，请用容器 DNS 名替代 localhost，例如：
#   # langgraph_url: http://langgraph:2024
#   # gateway_url: http://gateway:8001
#   # 也可设置环境变量 DEER_FLOW_CHANNELS_LANGGRAPH_URL / DEER_FLOW_CHANNELS_GATEWAY_URL。
#
#   # 可选：所有 IM 通道的默认会话设置
#   session:
#     assistant_id: lead_agent  # 或自定义 Agent 名；自定义 Agent 经 lead_agent + agent_name 路由
#     config:
#       recursion_limit: 100
#     context:
#       thinking_enabled: true
#       is_plan_mode: false
#       subagent_enabled: false
#
#   feishu:
#     enabled: false
#     app_id: $FEISHU_APP_ID
#     app_secret: $FEISHU_APP_SECRET
#     # domain: https://open.feishu.cn       # 国内（默认）
#     # domain: https://open.larksuite.com   # 国际版
#
#   slack:
#     enabled: false
#     bot_token: $SLACK_BOT_TOKEN     # xoxb-...
#     app_token: $SLACK_APP_TOKEN     # xapp-...（Socket Mode）
#     allowed_users: []               # 空列表 = 允许所有用户
#
#   telegram:
#     enabled: false
#     bot_token: $TELEGRAM_BOT_TOKEN
#     allowed_users: []               # 空列表 = 允许所有用户
#
#     # 可选：通道级会话覆盖
#     session:
#       assistant_id: mobile-agent  # 此处也可填自定义 Agent 名
#       context:
#         thinking_enabled: false
#
#       # 可选：按 user_id 覆盖
#       users:
#         "123456789":
#           assistant_id: vip-agent
#           config:
#             recursion_limit: 150
#           context:
#             thinking_enabled: true
#             subagent_enabled: true
#   wecom:
#     enabled: false
#     bot_id: $WECOM_BOT_ID
#     bot_secret: $WECOM_BOT_SECRET

# ============================================================================
# 护栏（Guardrails）配置
# ============================================================================
# 可选：工具调用执行前的授权校验。
# 启用后，每次工具调用会先经配置的提供方判定再执行。
# 三种方式：内置白名单、OAP 策略提供方、自定义提供方。完整说明见 backend/docs/GUARDRAILS.md。
#
# 提供方通过类路径加载（resolve_variable，与 models/tools 相同）。

# --- 选项 1：内置 AllowlistProvider（无额外依赖）---
# guardrails:
#   enabled: true
#   provider:
#     use: deerflow.guardrails.builtin:AllowlistProvider
#     config:
#       denied_tools: ["bash", "write_file"]

# --- 选项 2：OAP passport 提供方（开放标准，任意实现）---
#   Open Agent Passport (OAP) 规范定义 passport 格式与决策码。
#   任意符合 OAP 的实现均可。示例使用 APort（参考实现）：
#     pip install aport-agent-guardrails && aport setup --framework deerflow
# guardrails:
#   enabled: true
#   provider:
#     use: aport_guardrails.providers.generic:OAPGuardrailProvider

# --- 选项 3：自定义提供方（需实现 evaluate/aevaluate）---
# guardrails:
#   enabled: true
#   provider:
#     use: my_package:MyGuardrailProvider
#     config:
#       key: value


# ============================================================================
# 飞书项目配置 (Feishu Project)
# ============================================================================
# 用于需求列表 API（/api/lark/requirements），通过 FeishuProjectMcp 查询工作项
# project_key 从飞书项目 URL 中提取：https://project.feishu.cn/{project_key}/...

feishu_project:
  # 飞书项目空间 Key（必填，/api/lark/requirements 依赖此字段）
  # 也可通过环境变量设置：在此填写 $FEISHU_PROJECT_KEY 并在 .env 中配置
  project_key: "qimao"
  # 视图 ID（必填），通过 get_view_detail 获取该视图下所有工作项
  # 从 URL 提取：https://project.feishu.cn/.../storyView/{view_id}
  view_id: "RwVp2aKDg"
  # 可选：视图中要获取的字段列表（支持字段 key 或显示名称）
  # wiki 对应「需求文档」链接字段
  view_fields:
    - 工作项ID
    - 规划迭代
    - 业务线
    - 功能模块
    - 需求名称
    - 需求文档
    - 需求状态
    - 当前负责人
    - 优先级

# ============================================================================
# 企业级研发集成配置 (Enterprise Connectors)
# ============================================================================
# 用于打通飞书项目与阿里云 Codeup 完整工作流，供 LangGraph 后端代劳执行

enterprise_connectors:
  enabled: true
  
  # Codeup 仓库集成配置
  codeup:
    enabled: true
    
    # OpenAPI 配置：用于自动创建分支、提 MR
    # 服务接入点 (domain)，例如：codeup.aliyun.com
    domain: $CODEUP_DOMAIN
    # 个人访问令牌 (对应请求头 x-yunxiao-token)
    yunxiao_token: $CODEUP_TOKEN
    # 组织 ID (仅中心版必填，Region版可为空)
    organization_id: $CODEUP_ORGANIZATION_ID
