# DeerFlow 应用配置
#
# 使用说明：
# - 复制本文件为 `config.yaml` 并按环境修改
# - 默认从当前工作目录读取 `config.yaml`。
#   可通过环境变量 `DEER_FLOW_CONFIG_PATH` 指定其他路径。
# - 任意字段值均可引用环境变量，例如：`api_key: $OPENAI_API_KEY`
# - `use` 为类路径字符串，形如 "包名.子包.模块:类名/变量名"。

# ============================================================================
# 配置版本（用于检测本地配置是否过时）
# ============================================================================
# 配置结构变更时请递增此数字。
# 运行 `make config-upgrade` 可将新字段合并进本地的 config.yaml。
config_version: 5

# ============================================================================
# 日志
# ============================================================================
# deerflow 模块日志级别（debug/info/warning/error）
log_level: info

# ============================================================================
# Token 用量统计
# ============================================================================
# 按每次模型调用统计 LLM token（输入/输出/合计）
# 通过 TokenUsageMiddleware 在 info 级别输出日志
token_usage:
  enabled: false

# ============================================================================
# 模型配置
# ============================================================================
# 配置 Agent 可用的 LLM 模型

